{% extends "base.html" %}
{% block title %}Execution Logs — AI DevOps{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
        <div>
            <h1 class="text-2xl font-bold tracking-tight text-theme-primary">Execution Logs</h1>
            <p class="mt-1 text-sm text-theme-secondary">Real-time sandbox pipeline execution history.</p>
        </div>
        <div class="flex items-center gap-3">
            <select id="status-filter" class="rounded-lg border border-theme bg-theme-secondary px-3 py-2 text-sm text-theme-primary focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none">
                <option value="all">All Status</option>
                <option value="SUCCESS">Passed</option>
                <option value="FAILED">Failed</option>
                <option value="PENDING">Pending</option>
            </select>
            <button onclick="window.__dashboardController &amp;&amp; window.__dashboardController.refresh()" class="rounded-lg bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700 transition-colors">
                Refresh
            </button>
        </div>
    </div>

    <div id="logs-grid" class="grid grid-cols-1 gap-5 sm:grid-cols-2 xl:grid-cols-3">
        <div id="loading-placeholder" class="col-span-full text-center py-16 text-theme-secondary">
            <div class="animate-pulse flex flex-col items-center gap-3">
                <div class="h-8 w-8 rounded-full bg-brand-600/20 border-2 border-brand-500/30"></div>
                <p class="text-sm">Loading telemetry stream...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/dashboard.js"></script>
{% endblock %}
