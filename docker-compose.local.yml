
networks:
  ai-devops-local-network:
    driver: bridge

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: local-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_devops_db_local}
      POSTGRES_USER: ${POSTGRES_USER:-devops_local_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-LocalDevelopmentPassword99}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    networks:
      - ai-devops-local-network

  redis-broker:
    image: redis:7-alpine
    container_name: local-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - ai-devops-local-network

  node-ingestion:
    build: ./ingestion-service
    container_name: local-node-gateway
    environment:
      - PORT=3000
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET?}
      - CELERY_BROKER_URL=redis://redis-broker:6379/${REDIS_DB:-0}
    depends_on:
      - redis-broker
    networks:
      - ai-devops-local-network

  django-dashboard:
    build: ./django-dashboard
    container_name: local-django-dashboard
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-devops_local_admin}:${POSTGRES_PASSWORD:-LocalDevelopmentPassword99}@postgres-db:5432/${POSTGRES_DB:-ai_devops_db_local}
      - CELERY_BROKER_URL=redis://redis-broker:6379/${REDIS_DB:-0}
      - CELERY_RESULT_BACKEND=redis://redis-broker:6379/${REDIS_DB:-0}
      - GITHUB_APP_IDENTIFIER=${GITHUB_APP_IDENTIFIER?}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH:-/app/certs/github_app.pem}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET?}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY?}
      - FERNET_KEY=${FERNET_KEY?}
      - DEBUG=${DJANGO_DEBUG:-True}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-30}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - PAYMENT_GATEWAY=${PAYMENT_GATEWAY:-stripe}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_mockkey}
      - STRIPE_WEBHOOK_SIGNING_SECRET=${STRIPE_WEBHOOK_SIGNING_SECRET:-whsec_mockkey}
      - STRIPE_ENTERPRISE_PRICE_ID=${STRIPE_ENTERPRISE_PRICE_ID:-price_mock}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL:-http://localhost/dashboard/}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL:-http://localhost/}
      - PAYMENT_MANUAL_REDIRECT_URL=${PAYMENT_MANUAL_REDIRECT_URL:-/dashboard/}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-console}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS:-billing@yourstartupdomain.com}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-AI DevOps Billing}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-mock_sendgrid_key}
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST:-smtp.gmail.com}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-587}
      - EMAIL_SMTP_TLS=${EMAIL_SMTP_TLS:-true}
      - EMAIL_SMTP_USER=${EMAIL_SMTP_USER:-}
      - EMAIL_SMTP_PASSWORD=${EMAIL_SMTP_PASSWORD:-}
      - SLACK_ALERTS_WEBHOOK_URL=${SLACK_ALERTS_WEBHOOK_URL:-}
    volumes:
      - ${DJANGO_CODE_MOUNT:-./django-dashboard}:/app
      - ${CERTS_PATH:-./certs}:/app/certs:ro
    depends_on:
      - postgres-db
      - redis-broker
    networks:
      - ai-devops-local-network

  celery-worker:
    build: ./django-dashboard
    container_name: local-celery-worker
    command: celery -A config worker --loglevel=${CELERY_LOG_LEVEL:-info} --concurrency=${CELERY_CONCURRENCY:-1}
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-devops_local_admin}:${POSTGRES_PASSWORD:-LocalDevelopmentPassword99}@postgres-db:5432/${POSTGRES_DB:-ai_devops_db_local}
      - CELERY_BROKER_URL=redis://redis-broker:6379/${REDIS_DB:-0}
      - CELERY_RESULT_BACKEND=redis://redis-broker:6379/${REDIS_DB:-0}
      - GITHUB_APP_IDENTIFIER=${GITHUB_APP_IDENTIFIER?}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH:-/app/certs/github_app.pem}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET?}
      - FERNET_KEY=${FERNET_KEY?}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY?}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-30}
      - PAYMENT_GATEWAY=${PAYMENT_GATEWAY:-stripe}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SIGNING_SECRET=${STRIPE_WEBHOOK_SIGNING_SECRET:-}
      - STRIPE_ENTERPRISE_PRICE_ID=${STRIPE_ENTERPRISE_PRICE_ID:-price_placeholder}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-console}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SLACK_ALERTS_WEBHOOK_URL=${SLACK_ALERTS_WEBHOOK_URL:-}
    volumes:
      - ${DJANGO_CODE_MOUNT:-./django-dashboard}:/app
      - ${CERTS_PATH:-./certs}:/app/certs:ro
    depends_on:
      - redis-broker
      - postgres-db
    networks:
      - ai-devops-local-network

  fastapi-brain:
    build: ./core-brain
    container_name: local-fastapi-brain
    ports:
      - "${FASTAPI_PORT:-8010}:8010"
    depends_on:
      - redis-broker
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENROUTER_API_KEY?}
      - OPENAI_MODEL=${OPENROUTER_MODEL:-gpt-4o-mini}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY?}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openrouter/qwen/qwen-2.5-coder-32b-instruct}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - HOST=0.0.0.0
      - PORT=8010
      - DATA_COLLECTION=${DATA_COLLECTION:-deny}
      - SLACK_ANALYSIS_WEBHOOK_URL=${SLACK_ANALYSIS_WEBHOOK_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CERTS_PATH:-./certs}:/app/certs:ro
    networks:
      - ai-devops-local-network

  caddy-proxy:
    image: caddy:2-alpine
    container_name: local-caddy-proxy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
    volumes:
      - ${CADDYFILE_PATH:-./Caddyfile.local}:/etc/caddy/Caddyfile
    depends_on:
      - node-ingestion
      - django-dashboard
    networks:
      - ai-devops-local-network
