
networks:
  ai-devops-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: enterprise-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_devops_db}
      POSTGRES_USER: ${POSTGRES_USER:-devops_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SecretSecurePasswordChangeMe}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-devops-network
    restart: always

  redis-broker:
    image: redis:7-alpine
    container_name: enterprise-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ai-devops-network
    restart: always

  node-ingestion:
    build: ./ingestion-service
    container_name: edge-node-gateway
    ports:
      - "${INGESTION_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET?}
      - CELERY_BROKER_URL=redis://redis-broker:6379/${REDIS_DB:-0}
    depends_on:
      - redis-broker
    networks:
      - ai-devops-network
    restart: always

  django-dashboard:
    build: ./django-dashboard
    container_name: control-django-dashboard
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-devops_admin}:${POSTGRES_PASSWORD:-SecretSecurePasswordChangeMe}@postgres-db:5432/${POSTGRES_DB:-ai_devops_db}
      - REDIS_URL=redis://redis-broker:6379/${REDIS_DB:-0}
      - CELERY_BROKER_URL=redis://redis-broker:6379/${REDIS_DB:-0}
      - CELERY_RESULT_BACKEND=redis://redis-broker:6379/${REDIS_DB:-0}
      - GITHUB_APP_IDENTIFIER=${GITHUB_APP_IDENTIFIER?}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH:-/app/certs/github_app.pem}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET?}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY?}
      - FERNET_KEY=${FERNET_KEY?}
      - DEBUG=${DJANGO_DEBUG:-False}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-90}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - PAYMENT_GATEWAY=${PAYMENT_GATEWAY:-stripe}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SIGNING_SECRET=${STRIPE_WEBHOOK_SIGNING_SECRET:-}
      - STRIPE_ENTERPRISE_PRICE_ID=${STRIPE_ENTERPRISE_PRICE_ID:-price_placeholder}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL:-http://localhost/dashboard/}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL:-http://localhost/}
      - PAYMENT_MANUAL_REDIRECT_URL=${PAYMENT_MANUAL_REDIRECT_URL:-/dashboard/}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-console}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS:-billing@yourstartupdomain.com}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-AI DevOps Billing}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST:-smtp.gmail.com}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-587}
      - EMAIL_SMTP_TLS=${EMAIL_SMTP_TLS:-true}
      - EMAIL_SMTP_USER=${EMAIL_SMTP_USER:-}
      - EMAIL_SMTP_PASSWORD=${EMAIL_SMTP_PASSWORD:-}
      - SLACK_ALERTS_WEBHOOK_URL=${SLACK_ALERTS_WEBHOOK_URL:-}
    volumes:
      - ${CERTS_PATH:-./certs}:/app/certs:ro
    depends_on:
      - postgres-db
      - redis-broker
    networks:
      - ai-devops-network
    restart: always

  celery-beat:
    build: ./django-dashboard
    container_name: scheduled-celery-beat
    command: celery -A config beat --loglevel=${CELERY_LOG_LEVEL:-info}
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-devops_admin}:${POSTGRES_PASSWORD:-SecretSecurePasswordChangeMe}@postgres-db:5432/${POSTGRES_DB:-ai_devops_db}
      - REDIS_URL=redis://redis-broker:6379/${REDIS_DB:-0}
      - CELERY_BROKER_URL=redis://redis-broker:6379/${REDIS_DB:-0}
      - CELERY_RESULT_BACKEND=redis://redis-broker:6379/${REDIS_DB:-0}
      - GITHUB_APP_IDENTIFIER=${GITHUB_APP_IDENTIFIER?}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH:-/app/certs/github_app.pem}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET?}
      - FERNET_KEY=${FERNET_KEY?}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY?}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-90}
      - PAYMENT_GATEWAY=${PAYMENT_GATEWAY:-stripe}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SIGNING_SECRET=${STRIPE_WEBHOOK_SIGNING_SECRET:-}
      - STRIPE_ENTERPRISE_PRICE_ID=${STRIPE_ENTERPRISE_PRICE_ID:-price_placeholder}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-console}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST:-smtp.gmail.com}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-587}
      - EMAIL_SMTP_TLS=${EMAIL_SMTP_TLS:-true}
      - EMAIL_SMTP_USER=${EMAIL_SMTP_USER:-}
      - EMAIL_SMTP_PASSWORD=${EMAIL_SMTP_PASSWORD:-}
      - SLACK_ALERTS_WEBHOOK_URL=${SLACK_ALERTS_WEBHOOK_URL:-}
    volumes:
      - ${CERTS_PATH:-./certs}:/app/certs:ro
    depends_on:
      - redis-broker
      - postgres-db
    networks:
      - ai-devops-network
    restart: always

  celery-worker:
    build: ./django-dashboard
    container_name: async-celery-worker
    command: celery -A config worker --loglevel=${CELERY_LOG_LEVEL:-info} --concurrency=${CELERY_CONCURRENCY:-2}
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-devops_admin}:${POSTGRES_PASSWORD:-SecretSecurePasswordChangeMe}@postgres-db:5432/${POSTGRES_DB:-ai_devops_db}
      - REDIS_URL=redis://redis-broker:6379/${REDIS_DB:-0}
      - CELERY_BROKER_URL=redis://redis-broker:6379/${REDIS_DB:-0}
      - CELERY_RESULT_BACKEND=redis://redis-broker:6379/${REDIS_DB:-0}
      - GITHUB_APP_IDENTIFIER=${GITHUB_APP_IDENTIFIER?}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH:-/app/certs/github_app.pem}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET?}
      - FERNET_KEY=${FERNET_KEY?}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY?}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-90}
      - PAYMENT_GATEWAY=${PAYMENT_GATEWAY:-stripe}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SIGNING_SECRET=${STRIPE_WEBHOOK_SIGNING_SECRET:-}
      - STRIPE_ENTERPRISE_PRICE_ID=${STRIPE_ENTERPRISE_PRICE_ID:-price_placeholder}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-console}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST:-smtp.gmail.com}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-587}
      - EMAIL_SMTP_TLS=${EMAIL_SMTP_TLS:-true}
      - EMAIL_SMTP_USER=${EMAIL_SMTP_USER:-}
      - EMAIL_SMTP_PASSWORD=${EMAIL_SMTP_PASSWORD:-}
      - SLACK_ALERTS_WEBHOOK_URL=${SLACK_ALERTS_WEBHOOK_URL:-}
    volumes:
      - ${CERTS_PATH:-./certs}:/app/certs:ro
    depends_on:
      - redis-broker
      - postgres-db
    networks:
      - ai-devops-network
    restart: always

  billing-collector:
    build: ./billing-collector
    container_name: enterprise-billing-collector
    environment:
      - API_GATEWAY_URL=${BILLING_API_GATEWAY:-http://django-dashboard:8000}
      - INTERNAL_BILLING_TOKEN=${INTERNAL_BILLING_TOKEN:-LocalSecretInternalTokenBetweenServices}
      - COLLECT_INTERVAL_SECONDS=${COLLECT_INTERVAL_SECONDS:-86400}
      - ORG_NAME=${BILLING_ORG_NAME:-default}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      - django-dashboard
    networks:
      - ai-devops-network
    restart: always
    profiles:
      - billing

  fastapi-brain:
    build: ./core-brain
    container_name: core-fastapi-brain
    ports:
      - "${FASTAPI_PORT:-8010}:8010"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENROUTER_API_KEY?}
      - OPENAI_MODEL=${OPENROUTER_MODEL:-gpt-4o-mini}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY?}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - HOST=0.0.0.0
      - PORT=8010
      - DATA_COLLECTION=${DATA_COLLECTION:-deny}
      - SLACK_ANALYSIS_WEBHOOK_URL=${SLACK_ANALYSIS_WEBHOOK_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CERTS_PATH:-./certs}:/app/certs:ro
    networks:
      - ai-devops-network
    restart: always

  caddy-proxy:
    image: caddy:2-alpine
    container_name: production-caddy-proxy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ${CADDYFILE_PATH:-./Caddyfile}:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ai-devops-network
    restart: always
